name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Add package files
        run: |
          Get-ChildItem -Recurse -File | Where-Object { $_.FullName -notlike "*node_modules*" -and $_.FullName -notlike "*\.git*" } | ForEach-Object { Write-Host $_.FullName }

      - name: Build the app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: List dist folder
        run: Get-ChildItem -Path dist -Recurse -File | Select-Object FullName, Length

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TrackHunter ${{ steps.version.outputs.version }}.exe
            dist/TrackHunter Setup ${{ steps.version.outputs.version }}.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
